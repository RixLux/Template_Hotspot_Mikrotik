<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Error - Hotspot</title>
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="css/all.min.css">
</head>
<body>
    <div class="main-container">
        <div class="left-panel">
            <div class="logo-text">Luxia</div>
        </div>
        
        <div class="right-panel">
            <div class="status-icon error">
                <i class="fas fa-exclamation-triangle"></i>
            </div>

            <div class="form-header">
                <h2>ERROR</h2>
                <p>Terjadi kesalahan saat memproses permintaan Anda.</p>
            </div>

            <div class="info-box" style="border-left: 4px solid var(--error-color);">
                <p style="color: var(--text-color); font-size: 14px; text-align: center;">
                    $(error)
                </p>
            </div>

            <div class="button-container">
                <a href="$(link-login)" class="btn">BACK TO LOGIN <i class="fas fa-chevron-left"></i></a>
            </div>

            <div class="footer">
                <p>Created By <a href="https://github.com/RixLux" target="_blank">Luxia</a></p>
            </div>
        </div>
    </div>
</body>
</html>
