<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Welcome - Hotspot Login</title>
    <meta http-equiv="pragma" content="no-cache" />
    <meta http-equiv="expires" content="-1" />	
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="css/all.min.css">
</head>
<body>
    <div style="display: none;">
        $(if chap-id)
        <form name="sendin" action="$(link-login-only)" method="post">
            <input type="hidden" name="username" />
            <input type="hidden" name="password" />
            <input type="hidden" name="dst" value="$(link-orig)" />
            <input type="hidden" name="popup" value="true" />
        </form>
        
        <script type="text/javascript" src="md5.js"></script>
        <script type="text/javascript">
            function doLogin() {
                document.sendin.username.value = document.login.username.value;
                document.sendin.password.value = hexMD5('$(chap-id)' + document.login.password.value + '$(chap-challenge)');
                document.sendin.submit();
                return false;
            }
        </script>
        $(endif)
    </div>

    <div class="main-container">
        <div class="left-panel">
            <div class="logo-text">RixLux</div>
        </div>
        
        <div class="right-panel">
            <div id="lang-selector-container" style="text-align: right; margin-bottom: 10px;"></div>
            
            <div class="form-header">
                <h2 data-i18n="login_title">LOGIN</h2>
                <p data-i18n="login_desc">Silakan masukkan nama pengguna dan kata sandi Anda untuk mengakses internet.</p>
            </div>

            $(if error)
            <div style="color: var(--error-color); text-align: center; margin-bottom: 20px; font-size: 14px;">
                $(error)
            </div>
            $(endif)
            
            <form name="login" action="$(link-login-only)" method="post"
                $(if chap-id) onSubmit="return doLogin()" $(endif)>
                <input type="hidden" name="dst" value="$(link-orig)" />
                <input type="hidden" name="popup" value="true" />
                
                <div class="form-group">
                    <label for="user" data-i18n="username_label"><i class="fas fa-user"></i> Username</label>
                    <input id="user" name="username" type="text" placeholder="Masukkan username" data-i18n="username_placeholder" required />
                </div>
                
                <div class="form-group">
                    <label for="pass" data-i18n="password_label"><i class="fas fa-lock"></i> Password</label>
                    <input id="pass" name="password" type="password" placeholder="Masukkan password" data-i18n="password_placeholder" />
                </div>
                
                <div class="button-container">
                    <button id="boton" type="submit" data-i18n="login_button">LOGIN <i class="fas fa-arrow-right"></i></button>
                </div>
            </form>

            $(if trial == 'yes')
            <div style="margin-top: 25px; text-align: center;">
                <p style="font-size: 13px; color: var(--light-text); margin-bottom: 10px;" data-i18n="trial_msg">Atau coba gratis selama beberapa menit.</p>
                <a href="$(link-login-only)?dst=$(link-orig-esc)&amp;username=T-$(mac-esc)" class="btn" style="background-color: transparent; border: 1px solid var(--primary-color); color: var(--primary-color);" data-i18n="trial_button">
                    COBA GRATIS <i class="fas fa-gift"></i>
                </a>
            </div>
            $(endif)
            
            <div class="footer">
                <p>Created By <a href="https://github.com/RixLux" target="_blank">RixLux</a></p>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="lang.js"></script>
    <script type="text/javascript">
        document.login.username.focus();
        document.oncontextmenu = function(){return false;}
    </script>
</body>
</html>
